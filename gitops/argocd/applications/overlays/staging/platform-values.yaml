# Staging overlay values for the alloy platform chart.
#
# Reduces HA and disables backups for cost savings.
postgres:
  enabled: false
  instances: 1
  backup:
    enabled: false

redis:
  enabled: false
  dragonfly:
    replicas: 1

observability:
  serviceMonitor:
    enabled: true
  grafanaDashboard:
    enabled: true
  prometheusRules:
    enabled: true
