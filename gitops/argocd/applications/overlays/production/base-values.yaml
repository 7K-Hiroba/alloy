# Production overlay values for the ${{ values.name }} base chart.
#
# Full HA configuration with autoscaling and PDB.
replicaCount: 3

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 2

gateway:
  hostnames:
    - ${{ values.name }}.example.com

resources:
  limits:
    cpu: "2"
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

envFrom:
  - configMapRef:
      name: ${{ values.name }}-config
  - secretRef:
      name: ${{ values.name }}
