# Production overlay values for the alloy base chart.
#
# Alloy runs as a DaemonSet on every node for telemetry collection.
alloy:
  image:
    repository: grafana/alloy
    pullPolicy: IfNotPresent
    tag: ""
  controller:
    type: daemonset
  service:
    enabled: true
    type: ClusterIP
  alloy:
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi
    mounts:
      varlog: true
      dockercontainers: true
