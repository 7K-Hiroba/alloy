# ArgoCD AppProject for alloy.
#
# Defines the boundaries for what the Applications can deploy.
#
# Usage:
#   kubectl apply -f gitops/argocd/applications/apps/project.yaml
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: alloy
  namespace: argocd
  labels:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/part-of: hiroba
spec:
  description: ${{ values.description }}
  sourceRepos:
    - https://github.com/7K-Hiroba/alloy.git
  destinations:
    - namespace: alloy
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: ""
      kind: PersistentVolumeClaim
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: autoscaling
      kind: HorizontalPodAutoscaler
    - group: policy
      kind: PodDisruptionBudget
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
    - group: postgresql.cnpg.io
      kind: Cluster
    - group: postgresql.cnpg.io
      kind: ScheduledBackup
    - group: dragonflydb.io
      kind: Dragonfly
    - group: external-secrets.io
      kind: ExternalSecret
    - group: monitoring.coreos.com
      kind: ServiceMonitor
    - group: monitoring.coreos.com
      kind: PrometheusRule
  orphanedResources:
    warn: true
