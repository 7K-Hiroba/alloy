# ConfigMap for non-sensitive alloy configuration.
#
# Alloy configuration is primarily delivered via the Helm chart's
# configMap.create / configMap.content values. This ConfigMap can be
# used for additional environment variables consumed by Alloy components.
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: alloy
  labels:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/part-of: hiroba
data:
  # Example: set Alloy deployment mode hint
  ALLOY_DEPLOY_MODE: helm
