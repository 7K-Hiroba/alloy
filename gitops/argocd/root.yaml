# ArgoCD Root Application for Alloy
# This application deploys only the platform chart since the base application
# is deployed from the official upstream Helm chart.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/part-of: hiroba
spec:
  project: alloy
  source:
    repoURL: https://github.com/7K-Hiroba/alloy.git
    targetRevision: HEAD
    path: gitops/argocd/applications/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
