# ArgoCD ApplicationSet for multi-environment, multi-chart deployment of alloy.
#
# Generates Applications for both base and platform charts across
# staging and production environments. Each environment gets its own
# overlay with appropriate resource sizing and HA configuration.
#
# Structure per environment:
#   alloy-<env>-base      → Application workload
#   alloy-<env>-platform  → Infrastructure (DB, cache, secrets, observability)
#
# Usage:
#   kubectl apply -f gitops/argocd/applicationset.yaml
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: alloy
  namespace: argocd
  labels:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/part-of: hiroba
spec:
  generators:
    - list:
        elements:
          - env: staging
            host: alloy-staging.example.com
            namespace: alloy-staging
            baseReplicas: 1
            pgInstances: 1
            redisReplicas: 1
            backup: "false"
            storageSize: 10Gi
            autoSync: "true"
          - env: production
            host: alloy.example.com
            namespace: alloy
            baseReplicas: 2
            pgInstances: 3
            redisReplicas: 3
            backup: "true"
            storageSize: 50Gi
            autoSync: "true"
  template:
    metadata:
      name: "alloy-{{env}}"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      labels:
        app.kubernetes.io/name: alloy
        app.kubernetes.io/part-of: hiroba
        environment: "{{env}}"
    spec:
      project: alloy
      sources:
        - repoURL: https://github.com/7K-Hiroba/alloy.git
          targetRevision: HEAD
          path: helm/base
          helm:
            valuesObject:
              alloy:
                image:
                  repository: grafana/alloy
                  pullPolicy: IfNotPresent
                  tag: ""
                controller:
                  type: daemonset
                alloy:
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 100m
                      memory: 256Mi
                  envFrom:
                    - configMapRef:
                        name: alloy-config
        - repoURL: https://github.com/7K-Hiroba/alloy.git
          targetRevision: HEAD
          path: helm/platform
          helm:
            valuesObject:
              global:
                appName: alloy
              postgres:
                enabled: false
                instances: "{{pgInstances}}"
                storage:
                  size: "{{storageSize}}"
                database: alloy
                owner: alloy
                backup:
                  enabled: "{{backup}}"
              redis:
                enabled: false
                dragonfly:
                  replicas: "{{redisReplicas}}"
              s3:
                enabled: false
              externalSecrets:
                enabled: false
              observability:
                serviceMonitor:
                  enabled: true
                  port: http-metrics
                  path: /metrics
                grafanaDashboard:
                  enabled: true
                prometheusRules:
                  enabled: true
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
