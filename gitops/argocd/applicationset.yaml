# ArgoCD ApplicationSet for multi-environment, multi-chart deployment of ${{ values.name }}.
#
# Generates Applications for both base and platform charts across
# staging and production environments. Each environment gets its own
# overlay with appropriate resource sizing and HA configuration.
#
# Structure per environment:
#   ${{ values.name }}-<env>-base      → Application workload
#   ${{ values.name }}-<env>-platform  → Infrastructure (DB, cache, secrets, observability)
#
# Usage:
#   kubectl apply -f gitops/argocd/applicationset.yaml
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ${{ values.name }}
  namespace: argocd
  labels:
    app.kubernetes.io/name: ${{ values.name }}
    app.kubernetes.io/part-of: hiroba
spec:
  generators:
    - list:
        elements:
          - env: staging
            host: ${{ values.name }}-staging.example.com
            namespace: ${{ values.name }}-staging
            baseReplicas: 1
            pgInstances: 1
            redisReplicas: 1
            backup: "false"
            storageSize: 10Gi
            autoSync: "true"
          - env: production
            host: ${{ values.name }}.example.com
            namespace: ${{ values.name }}
            baseReplicas: 2
            pgInstances: 3
            redisReplicas: 3
            backup: "true"
            storageSize: 50Gi
            autoSync: "true"
  template:
    metadata:
      name: "${{ values.name }}-{{env}}"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      labels:
        app.kubernetes.io/name: ${{ values.name }}
        app.kubernetes.io/part-of: hiroba
        environment: "{{env}}"
    spec:
      project: ${{ values.name }}
      sources:
        - repoURL: https://github.com/7K-Hiroba/${{ values.name }}.git
          targetRevision: HEAD
          path: helm/base
          helm:
            valuesObject:
              replicaCount: "{{baseReplicas}}"
              image:
                repository: ghcr.io/7k-hiroba/${{ values.name }}
                pullPolicy: IfNotPresent
                tag: ""
              gateway:
                enabled: true
                hostnames:
                  - "{{host}}"
                parentRefs:
                  - name: default-gateway
              envFrom:
                - configMapRef:
                    name: ${{ values.name }}-config
                - secretRef:
                    name: ${{ values.name }}
        - repoURL: https://github.com/7K-Hiroba/${{ values.name }}.git
          targetRevision: HEAD
          path: helm/platform
          helm:
            valuesObject:
              global:
                appName: ${{ values.name }}
              postgres:
                enabled: ${{ values.enablePostgres }}
                instances: "{{pgInstances}}"
                storage:
                  size: "{{storageSize}}"
                database: ${{ values.name }}
                owner: ${{ values.name }}
                backup:
                  enabled: "{{backup}}"
              redis:
                enabled: ${{ values.enablePostgres }}
                dragonfly:
                  replicas: "{{redisReplicas}}"
              s3:
                enabled: ${{ values.enableS3 }}
              externalSecrets:
                enabled: true
                storeRef:
                  name: cluster-secret-store
                  kind: ClusterSecretStore
                data:
                  - secretKey: ACCESS_TOKEN_SALT
                    remoteKey: ${{ values.name }}/auth
                    property: access-token-salt
                  - secretKey: JWT_SECRET_KEY
                    remoteKey: ${{ values.name }}/auth
                    property: jwt-secret-key
              observability:
                serviceMonitor:
                  enabled: true
                grafanaDashboard:
                  enabled: true
                prometheusRules:
                  enabled: true
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
