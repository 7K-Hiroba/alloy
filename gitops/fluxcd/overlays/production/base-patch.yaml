# Production patch for ${{ values.name }} base chart.
#
# Full HA configuration with autoscaling and PDB.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${{ values.name }}-base
  namespace: flux-system
spec:
  values:
    replicaCount: 3
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
    podDisruptionBudget:
      enabled: true
      minAvailable: 2
    gateway:
      hostnames:
        - ${{ values.name }}.example.com
    resources:
      limits:
        cpu: "2"
        memory: 1Gi
      requests:
        cpu: 500m
        memory: 512Mi
