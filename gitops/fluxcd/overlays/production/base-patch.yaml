# Production patch for alloy base chart.
#
# Increases resource limits for production telemetry collection.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy-base
  namespace: flux-system
spec:
  values:
    alloy:
      alloy:
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 250m
            memory: 512Mi
