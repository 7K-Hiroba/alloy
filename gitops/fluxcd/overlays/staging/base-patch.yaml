# Staging patch for ${{ values.name }} base chart.
#
# Reduces replica count and disables autoscaling/PDB.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${{ values.name }}-base
  namespace: flux-system
spec:
  values:
    replicaCount: 1
    autoscaling:
      enabled: false
    podDisruptionBudget:
      enabled: false
    gateway:
      hostnames:
        - ${{ values.name }}-staging.example.com
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
