# Staging overlay Kustomization for alloy.
#
# Reduces resources and disables HA for cost-effective staging.
resources:
  - ../../apps
patches:
  - path: base-patch.yaml
    target:
      kind: HelmRelease
      name: alloy-base
  - path: platform-patch.yaml
    target:
      kind: HelmRelease
      name: alloy-platform
