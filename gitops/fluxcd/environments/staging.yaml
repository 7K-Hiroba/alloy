# FluxCD Kustomization for ${{ values.name }} staging environment.
#
# References the staging overlay with reduced resources.
#
# Usage:
#   kubectl apply -f gitops/fluxcd/environments/staging.yaml
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ${{ values.name }}-staging
  namespace: flux-system
  labels:
    app.kubernetes.io/name: ${{ values.name }}
    app.kubernetes.io/part-of: hiroba
    environment: staging
spec:
  interval: 10m
  path: ./gitops/fluxcd/overlays/staging
  prune: true
  sourceRef:
    kind: GitRepository
    name: ${{ values.name }}
    namespace: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: ${{ values.name }}-base
      namespace: flux-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: ${{ values.name }}-platform
      namespace: flux-system
  timeout: 5m
