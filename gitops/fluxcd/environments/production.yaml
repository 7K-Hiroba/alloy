# FluxCD Kustomization for ${{ values.name }} production environment.
#
# References the production overlay with full HA configuration.
# Depends on staging to be healthy first.
#
# Usage:
#   kubectl apply -f gitops/fluxcd/environments/production.yaml
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ${{ values.name }}-production
  namespace: flux-system
  labels:
    app.kubernetes.io/name: ${{ values.name }}
    app.kubernetes.io/part-of: hiroba
    environment: production
spec:
  interval: 10m
  path: ./gitops/fluxcd/overlays/production
  prune: true
  sourceRef:
    kind: GitRepository
    name: ${{ values.name }}
    namespace: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: ${{ values.name }}-base
      namespace: flux-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: ${{ values.name }}-platform
      namespace: flux-system
  timeout: 10m
  dependsOn:
    - name: ${{ values.name }}-staging
      namespace: flux-system
