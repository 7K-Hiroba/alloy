# FluxCD Kustomization for alloy production environment.
#
# References the production overlay with full HA configuration.
# Depends on staging to be healthy first.
#
# Usage:
#   kubectl apply -f gitops/fluxcd/environments/production.yaml
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: alloy-production
  namespace: flux-system
  labels:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/part-of: hiroba
    environment: production
spec:
  interval: 10m
  path: ./gitops/fluxcd/overlays/production
  prune: true
  sourceRef:
    kind: GitRepository
    name: alloy
    namespace: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: alloy-base
      namespace: flux-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: alloy-platform
      namespace: flux-system
  timeout: 10m
  dependsOn:
    - name: alloy-staging
      namespace: flux-system
