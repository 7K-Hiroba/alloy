# Platform values for Alloy
# These are example resource definitions managed by cluster operators (CNPG, Crossplane, etc.).
# Add, remove, or customise them to match your application's needs.
#
# Each resource supports a `provider` switch to select the backend implementation.
# Available providers are listed per resource — add your own by creating a
# matching template file in templates/<category>/<resource>-<provider>.yaml
#
# Templates are organized into subdirectories:
#   database/    — Database resources (CNPG, etc.)
#   storage/     — Object storage (Crossplane, Garage, etc.)
#   secrets/     — External secrets management
#   observability/ — ServiceMonitors, Grafana dashboards, PrometheusRules

global:
  # -- Application name, used as prefix for all platform resources
  appName: alloy
  # -- Release name of the base chart deployment. When set, the ServiceMonitor
  # selector matches `app.kubernetes.io/instance: <baseInstance>` so multiple
  # releases of the same app coexist safely. Leave empty to match by name only.
  baseInstance: ""

# -- PostgreSQL database
# PostgreSQL - disabled (not needed for Alloy)
postgres:
  enabled: false
  # -- Provider: "cnpg" (CloudNativePG operator)
  provider: cnpg
  instances: 1
  storage:
    size: 10Gi
    storageClass: ""
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 256Mi
  # -- PostgreSQL version
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4
  # -- Database name to create
  database: app
  # -- Database owner
  owner: app
  # -- Backup configuration (optional)
  backup:
    enabled: false
    schedule: "0 2 * * *"
    retentionPolicy: "7d"
    # -- S3 bucket name for backups (defaults to <app>-pg-backups)
    bucketName: ""
    # -- S3 API endpoint for backups
    endpoint: "http://garage.garage.svc.cluster.local:3900"
    # -- Pre-existing secret containing S3 credentials
    credentialsSecret:
      # -- Name of the secret
      name: ""
      # -- Key in the secret for the access key ID
      accessKeyKey: accessKeyId
      # -- Key in the secret for the secret access key
      secretKeyKey: secretAccessKey
      # -- Key in the secret for the S3 region
      regionKey: region

# -- S3-compatible object storage buckets
# S3 Storage - disabled (not needed for Alloy)
s3:
  enabled: false
  # -- Provider: "crossplane" | "garage"
  provider: crossplane
  # -- Crossplane default settings (all buckets inherit, per-bucket overrides allowed)
  crossplane:
    region: us-east-1
    providerConfigRef: aws-provider
    lifecycle:
      enabled: false
      expirationDays: 90
  # -- Garage default settings (all buckets inherit, per-bucket overrides allowed)
  garage:
    # -- GarageCluster resource name to reference
    clusterRef: garage
    # -- Namespace of the GarageCluster (defaults to the same namespace). Cross-namespace requires a GarageReferenceGrant
    clusterRefNamespace: ""
    # -- Optional bucket quotas
    quotas: {}
    #  maxSize: 10Gi
    #  maxObjects: 100000
    # -- Optional website hosting configuration
    website: {}
    #  enabled: true
    #  indexDocument: index.html
    #  errorDocument: error.html
    # -- Optional bucket lifecycle rules
    lifecycle: {}
    #  rules:
    #    - id: expire-logs
    #      status: Enabled
    #      filter:
    #        prefix: "logs/"
    #      expirationDays: 30
  # -- List of S3 buckets to provision. All use the same provider.
  buckets:
    # -- Bucket name (will be prefixed with app name)
    - name: assets
      # -- Bucket ACL
      acl: private

# -- External Secrets (external-secrets.io)
# External Secrets - disabled (not needed for Alloy)
externalSecrets:
  enabled: false
  # -- How often to sync secrets
  refreshInterval: 1h
  # -- SecretStore or ClusterSecretStore reference
  storeRef:
    name: cluster-secret-store
    kind: ClusterSecretStore
  # -- Individual secret mappings
  data: []
  #  - secretKey: DATABASE_URL
  #    remoteKey: myapp/database
  #    property: url
  #  - secretKey: API_KEY
  #    remoteKey: myapp/api
  #    property: key
  # -- Pull all keys from a remote path
  dataFrom: []
  #  - extract:
  #      key: myapp/config
  # -- Optional target Secret template for value transformation.
  # See https://external-secrets.io/latest/guides/templating/
  target:
    template: {}
    # type: Opaque
    # data:
    #   DATABASE_URL: "postgres://{{ `{{ .username }}` }}:{{ `{{ .password }}` }}@host/{{ `{{ .database }}` }}"

# -- Observability resources
observability:
  # -- Prometheus ServiceMonitor
  serviceMonitor:
    enabled: true
    # -- Additional labels for ServiceMonitor discovery (e.g., release: kube-prometheus-stack)
    additionalLabels: {}
    # -- Service port name to scrape
    port: http-metrics
    # -- Metrics endpoint path
    path: /metrics
    # -- Scrape interval
    interval: 30s
    # -- Scrape timeout
    scrapeTimeout: 10s

  # -- Grafana dashboard (deployed as ConfigMap with sidecar label)
  grafanaDashboard:
    enabled: true
    # -- Grafana folder label
    folderLabel: ""

  # -- PrometheusRule alerts. `groups` is passed through `tpl` so values can
